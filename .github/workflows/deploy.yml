name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 556538462124.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push frontend
      run: |
        docker build -t $ECR_REGISTRY/frontend:latest ./frontend
        docker push $ECR_REGISTRY/frontend:latest

    - name: Build and push backend-node
      run: |
        docker build -t $ECR_REGISTRY/backend-node:latest ./backend-node
        docker push $ECR_REGISTRY/backend-node:latest

    - name: Build and push backend-python
      run: |
        docker build -t $ECR_REGISTRY/backend-python:latest ./backend-python
        docker push $ECR_REGISTRY/backend-python:latest

    - name: Deploy to k3s on EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          aws ecr get-login-password --region ap-south-1 | \
            sudo kubectl create secret docker-registry ecr-secret \
            --docker-server=556538462124.dkr.ecr.ap-south-1.amazonaws.com \
            --docker-username=AWS \
            --docker-password-stdin \
            --dry-run=client -o yaml | sudo kubectl apply -f -

          sudo kubectl rollout restart deployment/frontend
          sudo kubectl rollout restart deployment/backend-node
          sudo kubectl rollout restart deployment/backend-python

          sudo kubectl rollout status deployment/frontend
          sudo kubectl rollout status deployment/backend-node
          sudo kubectl rollout status deployment/backend-python